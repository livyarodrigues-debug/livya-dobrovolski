<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livydr Makeup</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#FFF8F3;
color:#6B4B5C;
}

header{
background:#F8C8DC;
padding:20px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

header h1{
font-size:40px;
}

nav{
margin-top:15px;
}

nav a{
text-decoration:none;
color:#6B4B5C;
font-weight:bold;
margin:15px;
}

.banner{
background:linear-gradient(#F8C8DC,#FFDCE8);
padding:70px 20px;
text-align:center;
}

.banner h2{
font-size:40px;
margin-bottom:15px;
}

.banner p{
font-size:18px;
margin-bottom:20px;
}

.banner button{
padding:12px 30px;
border:none;
background:#fff;
color:#E75480;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

section{
padding:40px 20px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.produtos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:15px;
}

.preco{
color:#E75480;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#F8C8DC;
cursor:pointer;
margin-top:8px;
}

footer{
background:#F8C8DC;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>
<body>

<header>
<h1>💄 LIVYDR</h1>
<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Novidades</a>
<a href="#">Contato</a>
</nav>
</header>

<div class="banner">
<h2>Beleza que inspira ✨</h2>
<p>As melhores maquiagens com estilo e qualidade.</p>
<button>Comprar Agora</button>
</div>

<section>

<h2>Mais Vendidos</h2>

<div class="produtos">

<div class="card">
<img src="https://via.placeholder.com/220x220/F8C8DC/FFFFFF?text=Batom" alt="">
<h3>Batom Matte</h3>
<p class="preco">R$ 39,90</p>
<button>Comprar</button>
<button class="like">❤ <span>0</span></button>
</div>

<div class="card">
<img src="https://via.placeholder.com/220x220/F8C8DC/FFFFFF?text=Gloss" alt="">
<h3>Gloss Shine</h3>
<p class="preco">R$ 29,90</p>
<button>Comprar</button>
<button class="like">❤ <span>0</span></button>
</div>

<div class="card">
<img src="https://via.placeholder.com/220x220/F8C8DC/FFFFFF?text=Paleta" alt="">
<h3>Paleta Nude</h3>
<p class="preco">R$ 79,90</p>
<button>Comprar</button>
<button class="like">❤ <span>0</span></button>
</div>

<div class="card">
<img src="https://via.placeholder.com/220x220/F8C8DC/FFFFFF?text=Blush" alt="">
<h3>Blush Rosa</h3>
<p class="preco">R$ 49,90</p>
<button>Comprar</button>
<button class="like">❤ <span>0</span></button>
</div>

</div>

</section>

<footer>
<p>© 2026 Livydr Makeup • Beleza com elegância 💕</p>
</footer>

<script>
const likes=document.querySelectorAll(".like");

likes.forEach(botao=>{
let curtiu=false;

botao.onclick=()=>{
const span=botao.querySelector("span");

if(!curtiu){
span.textContent++;
curtiu=true;
}else{
span.textContent--;
curtiu=false;
}
}
});
</script>

</body>
</html>
